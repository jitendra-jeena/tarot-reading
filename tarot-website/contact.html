<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Luna Tarot</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">✦ Luna Tarot</a>
  <ul class="nav-links"></ul>
</nav>

<div class="page-header">
  <span class="chip">✦ Contact</span>
  <h1 id="page-title"></h1>
</div>

<section class="section">
  <div class="contact-layout">
    <div class="contact-info">
      <h3 id="contact-subtitle"></h3>
      <p id="contact-desc"></p>
      <div class="contact-detail"><span>✉</span><span id="contact-email"></span></div>
      <div class="contact-detail"><span>✦</span><span>Response within 24 hours</span></div>
      <div class="contact-detail"><span>🌙</span><span>Sessions via email & video call</span></div>
    </div>
    <div class="contact-form">
      <div class="form-group"><label>Your name</label><input type="text" id="f-name" placeholder="e.g. Sofia" /></div>
      <div class="form-group"><label>Email address</label><input type="email" id="f-email" placeholder="you@example.com" /></div>
      <div class="form-group">
        <label>Reading type</label>
        <select id="f-type">
          <option value="">Select a reading...</option>
          <option>Single Card Reading</option>
          <option>Celtic Cross Spread</option>
          <option>Love & Relationship</option>
          <option>Annual Forecast</option>
        </select>
      </div>
      <div class="form-group"><label>Your message</label><textarea id="f-msg" placeholder="Share what's on your mind..."></textarea></div>
      <button class="submit-btn" onclick="submitForm()">Send message ✦</button>
      <div class="success-msg" id="success-msg"></div>
    </div>
  </div>
</section>

<footer><p></p></footer>

<script src="assets/js/main.js"></script>
<script>
(async () => {
  const [d, g] = await Promise.all([
    fetch('config/contact.json').then(r => r.json()),
    fetch('config/global.json').then(r => r.json())
  ]);
  document.getElementById('page-title').textContent = d.page_title;
  document.getElementById('contact-subtitle').textContent = d.subtitle;
  document.getElementById('contact-desc').textContent = d.description;
  document.getElementById('contact-email').textContent = g.email;
  window._confirmMsg = d.confirmation_message;
})();

function submitForm() {
  const name = document.getElementById('f-name').value.trim();
  const email = document.getElementById('f-email').value.trim();
  if (!name || !email) { alert('Please enter your name and email.'); return; }
  const msg = document.getElementById('success-msg');
  msg.textContent = window._confirmMsg || 'Thank you! Your message has been sent. ✦';
  msg.style.display = 'block';
  ['f-name','f-email','f-type','f-msg'].forEach(id => document.getElementById(id).value = '');
}
</script>
</body>
</html>
