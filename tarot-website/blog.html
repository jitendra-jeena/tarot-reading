<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog | Luna Tarot</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">✦ Luna Tarot</a>
  <ul class="nav-links"></ul>
</nav>

<div class="page-header">
  <span class="chip">✦ Blog</span>
  <h1 id="page-title"></h1>
</div>

<section class="section">
  <div class="blog-layout">
    <div id="posts-list"></div>
    <div>
      <div class="cotd-box" id="cotd-box"></div>
    </div>
  </div>
</section>

<footer><p></p></footer>

<script src="assets/js/main.js"></script>
<script>
(async () => {
  const d = await fetch('config/blog.json').then(r => r.json());
  document.getElementById('page-title').textContent = d.page_title;
  document.getElementById('posts-list').innerHTML = d.posts.map(p => `
    <div class="blog-card">
      <div class="blog-emoji">${p.emoji}</div>
      <div class="blog-body">
        <p class="blog-cat">${p.category}</p>
        <p class="blog-title">${p.title}</p>
        <p class="blog-date">${p.date}</p>
        <p class="blog-excerpt">${p.excerpt}</p>
      </div>
    </div>
  `).join('');
  const c = d.card_of_the_day;
  document.getElementById('cotd-box').innerHTML = `
    <p class="cotd-label">✦ Card of the Day</p>
    <div class="cotd-card">★</div>
    <p class="cotd-name">${c.name}</p>
    <p class="cotd-meaning">${c.meaning}</p>
    <p class="cotd-desc">${c.description}</p>
  `;
})();
</script>
</body>
</html>
