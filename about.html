<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About | Luna Tarot</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">✦ Luna Tarot</a>
  <ul class="nav-links"></ul>
</nav>

<div class="page-header">
  <span class="chip">✦ About</span>
  <h1>Meet your reader</h1>
</div>

<section class="section">
  <div class="about-grid">
    <div class="about-img" id="about-img">🔮</div>
    <div>
      <h2 class="about-name" id="about-name"></h2>
      <p class="about-title" id="about-reader-title"></p>
      <p class="about-bio" id="about-bio"></p>
      <div class="values-grid" id="values-grid"></div>
    </div>
  </div>
</section>

<footer><p></p></footer>

<script src="assets/js/main.js"></script>
<script>
(async () => {
  const d = await fetch('config/about.json').then(r => r.json());
  document.getElementById('about-name').textContent = d.name;
  document.getElementById('about-reader-title').textContent = d.title;
  document.getElementById('about-bio').textContent = d.bio;
  if (d.photo) {
    document.getElementById('about-img').innerHTML = `<img src="${d.photo}" alt="${d.name}" style="width:100%;height:100%;object-fit:cover;border-radius:12px;" onerror="this.parentElement.innerHTML='🔮'" />`;
  }
  document.getElementById('values-grid').innerHTML = d.values.map(v => `
    <div class="value-card">
      <div class="icon">${v.icon}</div>
      <h4>${v.title}</h4>
      <p>${v.desc}</p>
    </div>
  `).join('');
})();
</script>
</body>
</html>
