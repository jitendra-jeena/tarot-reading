<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Services | Luna Tarot</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">✦ Luna Tarot</a>
  <ul class="nav-links"></ul>
</nav>

<div class="page-header">
  <span class="chip" id="page-chip">✦ Services & Pricing</span>
  <h1 id="page-title"></h1>
</div>

<section class="section">
  <div class="services-grid" id="services-grid"></div>
</section>

<footer><p></p></footer>

<script src="assets/js/main.js"></script>
<script>
(async () => {
  const [d, g] = await Promise.all([
    fetch('config/services.json').then(r => r.json()),
    fetch('config/global.json').then(r => r.json())
  ]);
  document.getElementById('page-title').textContent = d.page_title;
  document.getElementById('services-grid').innerHTML = d.services.map(s => `
    <div class="svc-card ${s.popular ? 'popular' : ''}">
      ${s.popular ? '<span class="popular-badge">Most popular</span>' : ''}
      <p class="svc-name">${s.name}</p>
      <p class="svc-dur">${s.duration}</p>
      <p class="svc-price">${g.currency}${s.price} <span>/ session</span></p>
      <ul class="svc-features">${s.features.map(f => `<li>${f}</li>`).join('')}</ul>
      <a href="contact.html" class="svc-btn ${s.popular ? 'gold' : ''}">Book now</a>
    </div>
  `).join('');
})();
</script>
</body>
</html>
